<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exercicio 04</title>
    <style>
      body {
        font: normal 20pt Arial;
      }
    </style>
  </head>
  <body>
    <script>
      var nome = window.prompt("Qual e o seu nome? ");
      document.write(
        `Ola <strong>${nome}</strong>, seu nome tem ${nome.length} letras. <br>`,
      );
      document.write(`O seu nome em maiusculas e ${nome.toUpperCase()}`);
      document.write(`<br>O seu nome em minusculas e ${nome.toLowerCase()}`);

      var n1 = Number(window.prompt("Digite um numero:"));
      document.write(`<br> valor ${n1.toFixed(2)} com duas casas decimais`);
      document.write(
        `<br> valor ${n1.toFixed(2).replace(".", ",")} com duas casas decimais e virgula`,
      );
      document.write(
        `<br> valor ${n1.toLocaleString("pr-BR", { style: "currency", currency: "BRL" })} com duas casas decimais e moeda`,
      );
      document.write(
        `<br> valor ${n1.toLocaleString("pr-BR", { style: "currency", currency: "USD" })} com duas casas decimais e moeda`,
      );
      document.write(
        `<br> valor ${n1.toLocaleString("pr-BR", { style: "currency", currency: "EUR" })} com duas casas decimais e moeda`,
      );
    </script>
  </body>
</html>
