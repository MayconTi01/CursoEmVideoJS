<!doctype html>
<html lang="pt-br">
  <head>
    //Cabeça => configurações do documento
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu primeiro programa</title>
    <style>
      body {
        background-color: #805f5f;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
        /* comnetario CSS */
      }
      h1 {
        color: #ffcc00;
      }
    </style>
  </head>
  <body>
    //Corpo => conteúdo do documento
    <h1>Olá Mundo!</h1>
    <p>Ja me livrei da maldição do "Hello World!"</p>
    <!-- Comentario HTML -->
    <script>
      //Código JavaScript
      //comentario em JS

      // traformar em numero sendo expecifico

      //var n1 = Number.parseFloat(window.prompt("Digite um numero:")); //String
      //var n2 = Number.parseFloat(window.prompt("Digite outro numero:")); //String

      // traformar em numero sendo generico
      var n2 = Number(window.prompt("Digite outro numero:")); //String
      var n1 = Number(window.prompt("Digite um numero:")); //String
      var s = n1 + n2;
      window.alert("A soma dos valores e " + String(s) + s.toString());
      window.alert(`A soma de ${n1} + ${n2} e igual a ${s}`);

      // (number + number) para adição
      // (string + string) para concatenação
    </script>
  </body>
