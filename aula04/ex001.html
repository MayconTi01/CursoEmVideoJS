<!doctype html>
<html lang="pt-br">
  <head>
    //Cabeça => configurações do documento
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu primeiro programa</title>
    <style>
      body {
        background-color: #805f5f;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 50px;
      }
      h1 {
        color: #ffcc00;
      }
    </style>
  </head>
  <body>
    //Corpo => conteúdo do documento
    <h1>Olá Mundo!</h1>
    <p>Ja me livrei da maldição do "Hello World!"</p>
    <script>
      //Código JavaScript
      window.alert("Olá Mundo!");
      window.alert("Minha primeira mensagem em javascript!");
      window.confirm("Estou aprendendo a programar!");
      window.prompt("Qual e o seu nome?");
    </script>
  </body>
</html>
